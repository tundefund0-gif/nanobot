# NanoBot pip configuration for Termux (all architectures)
#
# Why --no-binary :all: ?
# PyPI's manylinux/musllinux wheels link against glibc/musl.
# Termux on Android uses Bionic libc — those wheels are INCOMPATIBLE.
#
# Installing from source ensures native extensions link against Bionic.
# Pure-Python packages are just extracted from the source tarball.
#
# Install:  mkdir -p ~/.config/pip && cp this_file ~/.config/pip/pip.conf

[global]
no-binary = :all:
